name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install project (lean extras; NOT [train] — torch/sb3/gymnasium are heavy)
        # The serve path (onnxruntime) + data/viz/dev are installed; the [train] extra
        # (torch + stable-baselines3 + gymnasium) is deliberately excluded so CI stays
        # fast and GPU-free. The torch/sb3 train/export path is marked `slow` and
        # skipped here; the serve + baselines + parity oracle run torch-free.
        run: uv pip install --system -e ".[data,serve,viz,dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (ruff)
        run: ruff format --check src tests

      - name: Type-check (mypy strict)
        # Non-blocking while residual strict-mode issues are burned down; surfaced in
        # the log without failing the whole pipeline.
        continue-on-error: true
        run: mypy src

      - name: Import-purity smoke (fresh interpreter)
        run: |
          python -c "import sys, rlallocator; leaked=[m for m in ('torch','stable_baselines3','gymnasium','onnxruntime') if m in sys.modules]; assert not leaked, leaked; print('import-pure OK')"

      - name: Test (pytest + coverage gate)
        run: pytest -q -m "not slow" --cov=rlallocator --cov-report=term --cov-fail-under=85
